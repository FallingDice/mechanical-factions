#units/

##ground/
unit.mechanical-factions-mechanical-striker.name = [orange]Junk Striker
unit.mechanical-factions-mechanical-striker.description = "A crude, expendable unit forged for attrition warfare. Its small frame and low production cost allow for relentless swarming. Operates solely on the ground, tearing through enemy defenses at point-blank range."
unit.mechanical-factions-mechanical-striker.details = It may not seem like much, but if we stick together, we cannot be ignored.

unit.mechanical-factions-mechanical-fixer.name = [orange]Junk Fixer
unit.mechanical-factions-mechanical-fixer.description = "A support variant of the mass-produced scrap mech. While slightly more fragile than its combat-focused counterparts, it is equipped with a crude reclamation system. This mechanism constantly scavenges nearby debris to patch up its own chassis and those of its surrounding allies on the fly."
unit.mechanical-factions-mechanical-fixer.details = It is most effective when multiple units are gathered together.

